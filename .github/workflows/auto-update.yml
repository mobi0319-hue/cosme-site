name: Auto Update Data

on:
  schedule:
    # JST 2:00 = UTC 17:00 (前日)
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pipeline deps
        working-directory: scripts
        run: npm install

      - name: Run pipeline
        working-directory: scripts
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID || 'mobi.0319' }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG || 'yuaffiliate01-22' }}
        run: npm run run-all

      - name: Commit & push if changed
        run: |
          git config user.name "cosme-site-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "data: auto-update $(date -u +%Y-%m-%d)"
            git push
          fi
